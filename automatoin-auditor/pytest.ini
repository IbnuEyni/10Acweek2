[pytest]
# Set PYTHONPATH to include current directory
pythonpath = .

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers

# Test paths
testpaths = tests

# Markers
markers =
    security: Security-related tests
    unit: Unit tests
    integration: Integration tests
